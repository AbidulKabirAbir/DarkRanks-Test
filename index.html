<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DarkRanks ULTRA · Live + Movies + YouTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #0f0f14, #050507);
            color: #eef2ff;
            overflow: hidden;
            height: 100vh;
            font-weight: 500;
        }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: #00f2fe; border-radius: 10px; }

        .header {
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(8, 8, 16, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            z-index: 120;
        }
        .logo-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.2s ease;
            position: relative;
        }
        .logo-brand:hover { transform: scale(1.02); }
        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(145deg, #00f2fe, #fa4b6e);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: subtleGlow 3s infinite alternate;
        }
        .logo-icon.flip { transform: rotateY(180deg); }
        @keyframes subtleGlow {
            0% { box-shadow: 0 0 0 rgba(0,242,254,0); filter: brightness(1); }
            100% { box-shadow: 0 0 12px rgba(0,242,254,0.6); filter: brightness(1.05); }
        }
        .logo-brand:hover .logo-icon { animation: none; transform: scale(1.03); box-shadow: 0 0 20px rgba(0,242,254,0.8); }
        .logo-text {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -1px;
            display: flex;
            align-items: baseline;
            gap: 8px;
            transition: text-shadow 0.2s;
            position: relative;
            padding-bottom: 4px;
        }
        .logo-text::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00f2fe, #00f2fe, #fa4b6e);
            border-radius: 2px;
            box-shadow: 0 0 6px #00f2fe;
            animation: slideUnderline 3s ease-in-out 2, slidePause 25s infinite;
            animation-fill-mode: forwards;
        }
        @keyframes slideUnderline {
            0% { left: 0; width: 0; }
            20% { width: 30px; left: 0; }
            80% { width: 70px; left: calc(100% - 70px); }
            100% { width: 0; left: 100%; }
        }
        @keyframes slidePause {
            0%, 100% { opacity: 0; }
            10%, 90% { opacity: 0; }
        }
        .logo-text span:first-child { background: linear-gradient(135deg, #fff, #00f2fe); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-text span:last-child { color: #fa4b6e; }

        .source-badge {
            background: rgba(0,242,254,0.15); padding: 4px 12px; border-radius: 40px;
            font-size: 12px; font-weight: 600; border-left: 2px solid #00f2fe;
            cursor: pointer; white-space: nowrap; margin-left: 12px; transition: 0.2s;
        }
        .source-badge:hover { background: rgba(0,242,254,0.3); transform: scale(1.02); }
        .badge-group { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .live-badge {
            background: rgba(250, 75, 110, 0.15); padding: 6px 16px; border-radius: 40px;
            display: flex; align-items: center; gap: 8px; font-size: 13px;
        }
        .live-dot { width: 9px; height: 9px; background: #fa4b6e; border-radius: 50%; animation: pulse 1s infinite; }
        .time-display { font-family: monospace; background: #00000055; padding: 6px 14px; border-radius: 32px; font-size: 13px; text-align: center; }
        .date-display {
            font-size: 11px; background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 20px;
            display: flex; align-items: center; gap: 6px; backdrop-filter: blur(4px);
            border: 1px solid rgba(0,242,254,0.2); font-weight: 500;
        }
        .date-display i { font-size: 10px; color: #00f2fe; }
        
        /* Notice scrolling animation - continuous infinite */
        .support-notice {
            font-size: 11px;
            color: #ccc;
            margin-left: 56px;
            white-space: nowrap;
            transition: all 0.2s;
            position: relative;
            display: inline-block;
            cursor: default;
            overflow: hidden;
            width: auto;
            max-width: 280px;
        }
        .support-notice span {
            display: inline-block;
            will-change: transform;
            animation: scrollNotice 4s linear infinite;
        }
        @keyframes scrollNotice {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .support-notice:hover {
            text-shadow: 0 0 4px #00f2fe;
            color: #fff;
        }
        .support-notice::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, #00f2fe, #fa4b6e);
            border-radius: 1px;
            box-shadow: 0 0 4px #00f2fe;
            animation: slideUnderlineShort 2s ease-in-out 2, slidePauseShort 25s infinite;
            animation-fill-mode: forwards;
        }
        @keyframes slideUnderlineShort {
            0% { left: 0; width: 0; }
            30% { width: 60px; left: 0; }
            70% { width: 0; left: 100%; }
            100% { width: 0; left: 100%; }
        }
        @keyframes slidePauseShort {
            0%, 100% { opacity: 0; }
            10%, 90% { opacity: 0; }
        }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        .main-content { display: flex; flex: 1; padding: 20px 28px; gap: 28px; height: calc(100vh - 80px); overflow: hidden; position: relative; }
        .player-container { flex: 2.2; display: flex; flex-direction: column; gap: 12px; min-width: 0; height: 100%; overflow-y: auto; margin-top: -10px; }
        .video-wrapper {
            position: relative; background: #000; border-radius: 32px; overflow: hidden;
            box-shadow: 0 30px 40px rgba(0,0,0,0.7); aspect-ratio: 16/9;
            border: 1px solid rgba(0,242,254,0.3); cursor: pointer;
        }
        #video, #movieIframe, #youtubeIframe { width: 100%; height: 100%; object-fit: contain; background: #000; border: none; pointer-events: auto; }
        .channel-info {
            position: absolute; top: 18px; left: 20px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(16px); padding: 6px 18px; border-radius: 60px; font-size: 13px;
            border-left: 3px solid #00f2fe; z-index: 45; color: white; pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.3s ease;
        }
        .channel-info a { color: #00f2fe; text-decoration: none; font-size: 13px; }
        .video-controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 12px 20px; display: flex; gap: 12px; align-items: center;
            opacity: 0; transition: opacity 0.3s; z-index: 50; pointer-events: auto;
        }
        .video-wrapper:hover .video-controls { opacity: 1; }
        .video-wrapper.mouse-move .video-controls { opacity: 1; }
        .control-btn {
            width: 38px; height: 38px; background: rgba(20,20,32,0.8); backdrop-filter: blur(8px);
            border: none; border-radius: 50%; color: white; cursor: pointer;
        }
        .control-btn:hover { background: #00f2fe; color: #000; transform: scale(1.08); }
        .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; cursor: pointer; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00f2fe, #fa4b6e); width: 0%; border-radius: 4px; }
        .speed-select, .quality-select { background: #0a0a10; border: 1px solid #2a2a3a; border-radius: 40px; padding: 6px 12px; color: white; }

        .nav-arrows { position: absolute; top: 50%; left: 20px; right: 20px; transform: translateY(-50%); display: flex; justify-content: space-between; pointer-events: none; z-index: 40; }
        .nav-arrow { width: 44px; height: 44px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border-radius: 50%; border: none; color: white; font-size: 20px; cursor: pointer; pointer-events: auto; opacity: 0; transition: opacity 0.3s; }

        .loading-overlay, .error-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; z-index: 80; visibility: hidden; pointer-events: none; }
        .loading-overlay.active, .error-overlay.active { visibility: visible; }
        .spinner { width: 48px; height: 48px; border: 3px solid #00f2fe; border-top-color: transparent; border-radius: 50%; animation: spin 1s infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .channel-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(120%);
            width: 90%;
            max-width: 580px;
            background: rgba(10, 12, 20, 0.98);
            backdrop-filter: blur(32px);
            border-radius: 32px;
            border: 1px solid rgba(0,242,254,0.3);
            transition: transform 0.4s cubic-bezier(0.2,0.9,0.4,1.1);
            z-index: 200;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .channel-panel.show { transform: translateX(-50%) translateY(0); }
        .panel-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: grab;
            user-select: none;
            touch-action: none;
        }
        .panel-header:active { cursor: grabbing; }
        .dragon-icon { font-size: 20px; color: #00f2fe; filter: drop-shadow(0 0 2px rgba(0,242,254,0.5)); margin-right: 8px; }
        .drag-handle { font-size: 20px; font-weight: 800; color: #aaa; cursor: grab; transition: all 0.2s ease; line-height: 1; padding: 0 4px; border-radius: 8px; }
        .drag-handle:active { cursor: grabbing; }
        .drag-handle:hover {
            color: #fff;
            text-shadow: 0 0 6px #00f2fe, 0 0 10px #fa4b6e;
            background: linear-gradient(135deg, rgba(0,242,254,0.2), rgba(250,75,110,0.2));
            transform: scale(1.1);
        }
        .close-panel {
            background: none; border: none; color: #fff; font-size: 24px;
            cursor: pointer; transition: 0.2s; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }
        .close-panel:hover { background: rgba(250,75,110,0.3); color: #fa4b6e; transform: scale(1.1); }
        .source-toggle { display: flex; gap: 12px; padding: 12px 20px; flex-wrap: wrap; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .source-btn { padding: 8px 20px; background: rgba(255,255,255,0.05); border-radius: 40px; font-weight: 600; cursor: pointer; color: #eee; }
        .source-btn.active { background: linear-gradient(135deg, #00f2fe, #fa4b6e); color: #fff; }
        .search-bar {
            padding: 12px 20px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .search-input {
            flex: 1;
            padding: 12px 18px;
            background: #0a0a10;
            border: 1px solid #2a2a3a;
            border-radius: 60px;
            color: white;
            outline: none;
            min-width: 0;
        }
        .search-input:focus { border-color: #00f2fe; }
        .search-clear {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .search-add-btn {
            background: linear-gradient(135deg, #00f2fe, #fa4b6e);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
            font-size: 20px;
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        .search-add-btn:hover { transform: scale(1.05); }

        /* Add URL modal */
        .add-url-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }
        .add-url-overlay.active { display: flex; }
        .add-url-modal {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 30px;
            max-width: 480px;
            width: 90%;
            border: 1px solid rgba(0,242,254,0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .add-url-modal h3 {
            margin-bottom: 16px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .add-url-modal h3 i { color: #00f2fe; }
        .add-url-modal input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #2a2a3a;
            background: #0a0a10;
            color: #fff;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
        }
        .add-url-modal input:focus { border-color: #00f2fe; }
        .add-url-modal .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .add-url-modal .modal-actions button {
            padding: 10px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .add-url-modal .modal-actions .btn-add {
            background: linear-gradient(135deg, #00f2fe, #fa4b6e);
            color: #fff;
        }
        .add-url-modal .modal-actions .btn-add:hover { transform: scale(1.02); }
        .add-url-modal .modal-actions .btn-cancel {
            background: #2a2a3a;
            color: #aaa;
        }
        .add-url-modal .modal-actions .btn-cancel:hover { background: #3a3a4a; }

        .filters-section { padding: 8px 20px; background: rgba(0,0,0,0.3); backdrop-filter: blur(16px); position: sticky; top: 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .filter-label { font-size: 11px; text-transform: uppercase; color: #00f2fe; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .filter-label .favorites-toggle {
            background: none; border: none; color: #eee; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        .filter-label .favorites-toggle.active { color: #fa4b6e; }
        .tabs-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; }
        .filter-tab {
            padding: 5px 14px;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 40px;
            color: #ddd;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        .filter-tab.active { background: #00f2fe; color: #000; }
        .filter-tab.fire-effect {
            animation: fireBurn 0.4s ease-out;
        }
        @keyframes fireBurn {
            0% { transform: scale(1); background: #ff8c00; color: #fff; box-shadow: 0 0 0px #ff4500; }
            50% { transform: scale(1.15); background: #ff4500; color: #fff; box-shadow: 0 0 20px #ff4500; text-shadow: 0 0 4px #ffcc00; }
            100% { transform: scale(1); background: #00f2fe; color: #000; box-shadow: 0 0 0px #ff4500; }
        }

        .channels-grid { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .channels-grid.tv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
        }
        @media (min-width: 768px) {
            .channels-grid.tv-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        .channel-card {
            text-align: center;
            cursor: pointer;
            padding: 8px;
            border-radius: 20px;
            background: rgba(255,255,255,0.02);
            transition: 0.2s;
            position: relative;
        }
        .channel-card:hover {
            background: rgba(0,242,254,0.2);
            transform: translateY(-4px);
            border: 1px solid #00f2fe;
        }
        .channel-logo {
            width: 55px;
            height: 55px;
            margin: 0 auto 8px;
            border-radius: 50%;
            background: #1f1f2e;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
        }
        .channel-name {
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ddd;
        }
        .channel-fav {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }
        .channel-fav.active { color: #fa4b6e; }
        .channel-fav:hover { transform: scale(1.2); }

        .movies-container { padding: 20px; display: flex; flex-direction: column; gap: 40px; overflow-y: auto; }
        .movie-row { display: flex; flex-direction: column; gap: 12px; }
        .movie-row-header { display: flex; justify-content: space-between; align-items: baseline; padding-right: 20px; }
        .movie-row-title { font-size: 22px; font-weight: 700; border-left: 4px solid #00f2fe; padding-left: 12px; }
        .scroll-buttons { display: flex; gap: 8px; }
        .scroll-btn { width: 36px; height: 36px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .scroll-btn:hover { background: #00f2fe; color: #000; }
        .movie-row-scroll { display: flex; gap: 24px; overflow-x: auto; scroll-behavior: smooth; padding: 8px 4px 20px; }
        .movie-card {
            flex: 0 0 auto;
            width: 140px;
            cursor: pointer;
            border-radius: 20px;
            overflow: hidden;
            background: #13131f;
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .movie-card:hover { transform: scale(1.05); box-shadow: 0 20px 30px rgba(0,0,0,0.6); }
        .movie-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .poster-actions {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.25s;
            border-radius: 20px;
        }
        .movie-card:hover .poster-actions { opacity: 1; }
        .action-btn {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 16px;
            transition: 0.2s;
            position: relative;
        }
        .action-btn:hover { background: #00f2fe; color: #000; transform: scale(1.1); }
        .fav-btn-top {
            position: absolute;
            top: 6px;
            left: 6px;
            z-index: 5;
            width: auto;
            height: 32px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 14px;
            padding: 0 10px;
            gap: 6px;
        }
        .fav-btn-top.active i { color: #fa4b6e; }
        .movie-info { padding: 8px; text-align: center; }
        .movie-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-year { font-size: 10px; color: #aaa; }
        .rating-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 10px;
            color: #ffd700;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
        }
        .rating-badge span.imdb-text { font-size: 7px; color: #ccc; }
        .custom-tooltip {
            position: absolute;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 200;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            display: none;
        }

        /* Search loading and no results messages */
        .search-loading, .no-results {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 32px;
            margin: 20px;
        }
        .search-loading i, .no-results i {
            font-size: 48px;
            color: #00f2fe;
            margin-bottom: 16px;
            display: block;
        }

        .hero-carousel {
            position: relative;
            margin-bottom: 30px;
            border-radius: 24px;
            overflow: hidden;
            height: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .hero-slides { position: relative; width: 100%; height: 100%; }
        .hero-slide {

        async function fetchGlobalChannels() {
            const cached = localStorage.getItem('darkranks_global');
            if(cached) {
                try {
                    let d = JSON.parse(cached);
                    if(Date.now() - d.ts < 86400000 && d.channels && d.channels.length) {
                        return d.channels;
                    }
                } catch(e) {}
            }
            setStatus('🌍 Loading global IPTV...');
            try {
                const [chRes, stRes, cntRes] = await Promise.all([
                    fetch('https://iptv-org.github.io/api/channels.json'),
                    fetch('https://iptv-org.github.io/api/streams.json'),
                    fetch('https://iptv-org.github.io/api/countries.json')
                ]);
                if (!chRes.ok || !stRes.ok) throw new Error('Network response not ok');
                const channels = await chRes.json();
                const streams = await stRes.json();
                const countries = await cntRes.json();
                const countryMap = new Map(countries.map(c => [c.code, c.name]));
                const streamMap = new Map();
                for(let s of streams) {
                    if(s.channel && s.url && s.url.startsWith('http')) {
                        if(!streamMap.has(s.channel)) streamMap.set(s.channel, []);
                        streamMap.get(s.channel).push(s.url);
                    }
                }
                const combined = [];
                for(let ch of channels) {
                    let urls = streamMap.get(ch.id);
                    if(urls && urls.length) {
                        combined.push({
                            name: ch.name,
                            logo: ch.logo || '',
                            url: urls[0],
                            category: ch.categories?.[0] || "General",
                            country: ch.country ? (countryMap.get(ch.country) || ch.country) : "International"
                        });
                    }
                }
                if(combined.length === 0) throw new Error('No streams found');
                localStorage.setItem('darkranks_global', JSON.stringify({ channels: combined, ts: Date.now() }));
                setStatus(`✅ ${combined.length} global channels loaded`);
                return combined;
            } catch(e) {
                console.warn('Global IPTV fetch failed, using fallback', e);
                setStatus('⚠️ Using fallback global channels', true);
                return FALLBACK_GLOBAL;
            }
        }

        async function getMovieStream(imdbId) {
            for(let i=0; i<PROVIDERS.length; i++) {
                let p = PROVIDERS[(currentProvider + i) % PROVIDERS.length];
                try {
                    let controller = new AbortController();
                    let tid = setTimeout(()=>controller.abort(), 4000);
                    let html = await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(p.embedUrl(imdbId)), { signal: controller.signal }).then(r=>r.text());
                    clearTimeout(tid);
                    let match = html.match(p.extractPattern);
                    let url = match ? (match[1]||match[2]||match[0]) : null;
                    if(url && url.startsWith('http')) { currentProvider = (currentProvider + i) % PROVIDERS.length; return url; }
                } catch(e) {}
            }
            return null;
        }

                    : `https://www.omdbapi.com/?s=${encodeURIComponent(query)}&type=movie&apikey=${OMDB_KEY}`;
                let res = await fetch(url);
                let data = await res.json();
                if(data.Response === "True") {
                    let movies = [];
                    if(data.Search) {
                        for(let item of data.Search.slice(0, 24)) {
                            let detail = await fetch(`https://www.omdbapi.com/?i=${item.imdbID}&apikey=${OMDB_KEY}`).then(r=>r.json());
                            movies.push({

                                year: item.Year,

                                description: detail?.Plot || "No description",
                                logo: item.Poster !== "N/A" ? item.Poster : `https://via.placeholder.com/300x450`

        // ============================================================
        //  YOUTUBE SEARCH API FUNCTIONS (Super Intelligent)
        // ============================================================
        function formatDuration(seconds) {
            if (!seconds) return '';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            return `${m}:${String(m).padStart(2, '0')}`;
        }

        function getPublishDate(publishedAt) {
            const date = new Date(publishedAt);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function saveSearchHistory(query) {
            if (!query.trim()) return;
            let history = [];
            try {
                history = JSON.parse(localStorage.getItem('youtubeSearchHistory')) || [];
            } catch(e) {}
            history = history.filter(item => item !== query);
            history.unshift(query);
            if (history.length > 10) history.pop();
            localStorage.setItem('youtubeSearchHistory', JSON.stringify(history));
        }

        async function fetchYoutubeDurations(videoIds) {
            if (!videoIds) return {};
            try {
                const params = new URLSearchParams({
                    part: 'contentDetails',
                    id: videoIds,
                    key: YT_API_KEY,
                });
                const res = await fetch(`${YT_VIDEO_URL}?${params}`);
                if (!res.ok) return {};
                const data = await res.json();
                const map = {};
                if (data.items) {
                    data.items.forEach(item => {
                        const iso = item.contentDetails.duration;
                        const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
                        if (m) {
                            const h = parseInt(m[1] || 0);
                            const min = parseInt(m[2] || 0);
                            const sec = parseInt(m[3] || 0);
                            map[item.id] = h * 3600 + min * 60 + sec;
                        }
                    });
                }
                return map;
            } catch {
                return {};
            }
        }

        async function searchYoutube(query, pageToken = null) {
            if (ytIsLoading) return;
            ytIsLoading = true;

            if (!pageToken) {
                channelsGrid.innerHTML = `<div class="search-loading"><i class="fas fa-spinner fa-pulse"></i><div>Searching YouTube for "${query}"...</div></div>`;
            }

            try {
                const params = new URLSearchParams({
                    part: 'snippet',
                    q: query,
                    type: 'video',
                    maxResults: MAX_RESULTS,
                    key: YT_API_KEY,
                    videoEmbeddable: 'true',
                    safeSearch: 'none'
                });
                if (pageToken) params.append('pageToken', pageToken);
                const res = await fetch(`${YT_SEARCH_URL}?${params}`);
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `HTTP ${res.status}`);
                }
                const data = await res.json();
                if (!data.items || data.items.length === 0) {
                    if (!pageToken) {
                        ytSearchResults = [];
                        ytNextPageToken = null;
                    }
                    renderYoutubeGrid();
                    return;
                }
                const videoIds = data.items.map(item => item.id.videoId).join(',');
                const durationMap = await fetchYoutubeDurations(videoIds);
                const results = data.items.map(item => ({
                    id: item.id.videoId,
                    title: item.snippet.title,
                    channel: item.snippet.channelTitle,
                    publishedAt: getPublishDate(item.snippet.publishedAt),
                    thumbnail: item.snippet.thumbnails.high?.url || item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default?.url || '',
                    duration: durationMap[item.id.videoId] || '',
                    videoId: item.id.videoId,
                    category: 'Search Results'
                }));
                if (pageToken) {
                    ytSearchResults = [...ytSearchResults, ...results];
                } else {
                    ytSearchResults = results;
                }
                ytNextPageToken = data.nextPageToken || null;
                ytCurrentQuery = query;
                saveSearchHistory(query);
                renderYoutubeGrid();
            } catch (err) {
                console.error('YouTube search error:', err);
                showToast('Search failed: ' + err.message, true);
                if (!pageToken) {
                    ytSearchResults = [];
                    renderYoutubeGrid();
                }
            } finally {
                ytIsLoading = false;
            }
        }

        // -------- FLOATING TRAILER FOR MOVIES (FIXED - Hover on poster & click to play) ----------
        let trailerHoverTimer = null;
        let activeTrailerMovie = null;
        let trailerCardRef = null;

        function getTrailerEmbedUrl(movie) {
            // Use YouTube search for "movie name official trailer"
            const searchQuery = encodeURIComponent(movie.name + ' official trailer');
            // Use embed with search - this shows a playlist that auto-plays the first result
            return `https://www.youtube.com/embed/?listType=search&list=${searchQuery}&autoplay=1&controls=0&modestbranding=1&rel=0&iv_load_policy=3&disablekb=1&fs=0&mute=1`;
        }

        function getTrailerEmbedUrlFull(movie) {
            const searchQuery = encodeURIComponent(movie.name + ' official trailer');
            return `https://www.youtube.com/embed/?listType=search&list=${searchQuery}&autoplay=1&controls=1&modestbranding=1&rel=0&iv_load_policy=3&enablejsapi=1`;
        }

        function showFloatingTrailer(movie, event, card) {
            if (trailerHoverTimer) clearTimeout(trailerHoverTimer);
            trailerHoverTimer = setTimeout(() => {
                const rect = card.getBoundingClientRect();
                const trailerWidth = Math.min(320, window.innerWidth - 40);
                const trailerHeight = trailerWidth * 0.5625;
                
                let left = rect.left + (rect.width / 2) - (trailerWidth / 2);
                let top = rect.top - trailerHeight - 10;
                if (top < 10) {
                    top = rect.bottom + 10;
                }
                if (left < 10) left = 10;
                if (left + trailerWidth > window.innerWidth - 10) {
                    left = window.innerWidth - trailerWidth - 10;
                }
                
                floatingTrailer.style.left = left + 'px';
                floatingTrailer.style.top = top + 'px';
                floatingTrailer.style.width = trailerWidth + 'px';
                floatingTrailer.style.height = trailerHeight + 'px';
                
                const trailerSrc = getTrailerEmbedUrl(movie);
                floatingTrailerIframe.src = trailerSrc;
                floatingTrailer.classList.add('active');
                trailerCardRef = card;
                activeTrailerMovie = movie;
            }, 1800);
        }

        function hideFloatingTrailer() {
            if (trailerHoverTimer) {
                clearTimeout(trailerHoverTimer);
                trailerHoverTimer = null;
            }
            floatingTrailer.classList.remove('active');
            setTimeout(() => {
                floatingTrailerIframe.src = '';
            }, 150);
            activeTrailerMovie = null;
            trailerCardRef = null;
        }

        // -------- PLAY CHANNEL ----------
        async function playChannel(index, isRetry = false) {
            if(!displayItems.length) return;
            const item = displayItems[index];
            currentIdx = index;
            currentMovieItem = item;
            stopAll();
            loadingOverlay.classList.add('active');
            errorOverlay.classList.remove('active');
            video.style.display = 'block';
            movieIframe.style.display = 'none';

            if (channelInfoTimer) clearTimeout(channelInfoTimer);
            channelInfo.style.opacity = '1';

            if(currentSource === 'movies' && item.imdbId) {
                channelInfo.innerHTML = `<i class="fas fa-film"></i> ${item.name} (${item.year}) <a target="_blank" href="https://www.imdb.com/title/${item.imdbId}/"><i class="fab fa-imdb"></i> IMDb</a>`;
                channelInfoTimer = setTimeout(() => { channelInfo.style.opacity = '0'; }, 5000);

                let stream = await getMovieStream(item.imdbId);
                if(stream && Hls.isSupported()) {
                    video.style.display = 'block';
                    movieIframe.style.display = 'none';
                    hls = new Hls();
                    hls.startLevel = -1;
                    hls.loadSource(stream); hls.attachMedia(video);
                    let timeout = setTimeout(() => { if(loadingOverlay.classList.contains('active')) { loadingOverlay.classList.remove('active'); errorOverlay.classList.add('active'); } }, 8000);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        clearTimeout(timeout);
                        loadingOverlay.classList.remove('active');
                        video.muted = false;
                        savedMuted = false;
                        localStorage.setItem('darkranks_muted', 'false');
                        video.volume = savedVolume > 0 ? savedVolume : 1.0;
                        updateVolumeUI();
                        video.play();
                        populateQuality(hls.levels);
                        updateControlsVisibility();
                    });
                    hls.on(Hls.Events.ERROR, (_, data) => { if(data.fatal) { loadingOverlay.classList.remove('active'); errorOverlay.classList.add('active'); } });
                } else {
                    video.style.display = 'none';
                    movieIframe.style.display = 'block';
                    movieIframe.src = PROVIDERS[currentProvider].embedUrl(item.imdbId);
                    loadingOverlay.classList.remove('active');
                    showToast('Using iframe – some controls limited');
                    updateControlsVisibility();
                }
            } else if(currentSource === 'youtube') {
                showToast('Select a video from YouTube panel');
                loadingOverlay.classList.remove('active');
                channelInfoTimer = setTimeout(() => { channelInfo.style.opacity = '0'; }, 5000);
            } else {
                if (!isRetry) errorCount = 0;
                let url = item.url;
                channelInfo.innerHTML = `<i class="fas fa-tower-broadcast"></i> ${item.name} (${item.country || 'International'})`;
                channelInfoTimer = setTimeout(() => { channelInfo.style.opacity = '0'; }, 5000);
                video.style.display = 'block';
                movieIframe.style.display = 'none';
                if(Hls.isSupported()) {
                    hls = new Hls({ enableWorker: true });
                    hls.startLevel = -1;
                    hls.loadSource(url); hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        loadingOverlay.classList.remove('active');
                        video.muted = savedMuted;
                        video.volume = savedVolume;
                        updateVolumeUI();
                        video.play();
                        populateQuality(hls.levels);
                        errorCount = 0;
                        updateControlsVisibility();
                    });
                    hls.on(Hls.Events.ERROR, (_, data) => {
                        if(data.fatal) {
                            errorCount++;
                            if(errorCount <= 3) {
                                let nextIdx = (currentIdx + lastDirection + displayItems.length) % displayItems.length;
                                showToast(`Skipping to next (${errorCount}/3)`);
                                playChannel(nextIdx, true);
                            } else {
                                loadingOverlay.classList.remove('active');
                                errorOverlay.classList.add('active');
                            }
                        }
                    });
                } else if(video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.muted = savedMuted;
                    video.volume = savedVolume;
                    updateVolumeUI();
                    video.play();
                    video.onloadedmetadata = () => { loadingOverlay.classList.remove('active'); errorCount = 0; };
                    video.onerror = () => {
                        errorCount++;
                        if(errorCount <= 3) {
                            let nextIdx = (currentIdx + lastDirection + displayItems.length) % displayItems.length;
                            showToast(`Skipping to next (${errorCount}/3)`);
                            playChannel(nextIdx, true);
                        } else {
                            loadingOverlay.classList.remove('active');
                            errorOverlay.classList.add('active');
                        }
                    };
                } else {
                    errorCount++;
                    if(errorCount <= 3) {
                        let nextIdx = (currentIdx + lastDirection + displayItems.length) % displayItems.length;
                        showToast(`Skipping to next (${errorCount}/3)`);
                        playChannel(nextIdx, true);
                    } else {
                        loadingOverlay.classList.remove('active');
                        errorOverlay.classList.add('active');
                    }
                }
                updateControlsVisibility();
            }
            showToast(item.name);
            updateErrorButtons();
        }

        video.onplay = () => playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        video.onpause = () => playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        pipBtn.onclick = () => { if(video.requestPictureInPicture) video.requestPictureInPicture(); };
        video.ontimeupdate = () => { if(video.duration) progressFill.style.width = (video.currentTime/video.duration)*100+'%'; };
        progressBar.onclick = (e) => { let rect = progressBar.getBoundingClientRect(); let percent = (e.clientX-rect.left)/rect.width; if(video.duration) video.currentTime = percent*video.duration; };
        document.getElementById('speedSelect').onchange = (e) => video.playbackRate = parseFloat(e.target.value);
        
        function updateControlsVisibility() { 
            const controls = document.getElementById('videoControls');
            if (currentSource === 'youtube' || (currentSource === 'movies' && youtubeIframe.style.display === 'block' && youtubeIframe.src !== '')) {
                controls.style.display = 'none';
            } 
            else if (currentSource === 'movies' && movieIframe.style.display === 'block') {
                controls.style.display = 'none';
            } 
            else {
                controls.style.display = 'flex';
                for (let child of controls.children) {
                    child.style.display = '';
                }
            }
        }

        function onFirstInteraction() {
            if (!userHasInteracted) {
                userHasInteracted = true;
                if (video.muted && video.volume > 0) {
                    video.muted = false;
                    savedMuted = false;
                    localStorage.setItem('darkranks_muted', 'false');
                    updateVolumeUI();
                    showToast('Sound enabled');
                }
            }
        }
        document.addEventListener('click', onFirstInteraction);
        document.addEventListener('touchstart', onFirstInteraction);

        function addFireEffect(btn) {
            btn.classList.add('fire-effect');
            setTimeout(() => btn.classList.remove('fire-effect'), 400);
        }

        function renderTVGrid() {
            channelsGrid.className = 'channels-grid tv-grid';
            channelsGrid.innerHTML = '';
            displayItems.forEach((ch, i) => {
                let logoHtml = (ch.logo && ch.logo.startsWith('http')) ? `<img src="${ch.logo}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='${ch.name.charAt(0).toUpperCase()}'">` : `<span style="font-size:22px;">${ch.name.charAt(0).toUpperCase()}</span>`;
                let card = document.createElement('div'); card.className = `channel-card ${i===currentIdx?'active':''}`;
                let fav = isChannelFav(ch);
                card.innerHTML = `<div class="channel-logo">${logoHtml}</div><div class="channel-name">${ch.name}</div><button class="channel-fav ${fav?'active':''}" data-idx="${i}"><i class="fas fa-heart"></i></button>`;
                card.querySelector('.channel-fav').onclick = (e) => {
                    e.stopPropagation();
                    toggleChannelFav(ch);
                };
                card.onclick = () => { autoPlay = true; playChannel(i); };
                channelsGrid.appendChild(card);
            });
            if(autoPlay && displayItems.length && currentIdx === 0) playChannel(0);
            autoPlay = false;
        }

        // ---------- HERO CAROUSEL ----------
        let heroSlides = [];
        let currentSlide = 0;
        let autoSlideInterval = null;

        function startAutoSlide() {
            if (autoSlideInterval) clearInterval(autoSlideInterval);
            autoSlideInterval = setInterval(() => {
                if (heroSlides.length > 0 && document.querySelector('.hero-carousel')) {
                    goToSlide((currentSlide + 1) % heroSlides.length);
                }
            }, 2000);
        }

        function initHeroCarousel(movies) {
            heroSlides = [...movies].sort((a,b)=>parseFloat(b.rating)-parseFloat(a.rating)).slice(0,5);
            if(heroSlides.length === 0) return;
            const carouselDiv = document.createElement('div');
            carouselDiv.className = 'hero-carousel';
            carouselDiv.innerHTML = `
                <div class="hero-slides" id="heroSlides"></div>
                <div class="carousel-dots" id="carouselDots"></div>
                <button class="carousel-arrow prev" id="heroPrev"><i class="fas fa-chevron-left"></i></button>
                <button class="carousel-arrow next" id="heroNext"><i class="fas fa-chevron-right"></i></button>
            `;
            const slidesContainer = carouselDiv.querySelector('#heroSlides');
            const dotsContainer = carouselDiv.querySelector('#carouselDots');
            heroSlides.forEach((movie, idx) => {
                const slide = document.createElement('div');
                slide.className = `hero-slide ${idx === 0 ? 'active' : ''}`;
                slide.innerHTML = `<img src="${movie.logo}" onerror="this.style.display='none'"><div class="hero-content"><div class="hero-title">${movie.name}</div><div class="hero-desc">${movie.description || 'A cinematic masterpiece.'}</div><button class="hero-btn" data-idx="${idx}">▶ Play Now</button></div>`;
                slide.querySelector('.hero-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const globalIdx = displayItems.findIndex(m => m.imdbId === movie.imdbId);
                    if(globalIdx !== -1) playChannel(globalIdx, false);
                    else showToast('Movie not available');
                });
                slidesContainer.appendChild(slide);
                const dot = document.createElement('div');
                dot.className = `dot ${idx === 0 ? 'active' : ''}`;
                dot.addEventListener('click', () => goToSlide(idx));
                dotsContainer.appendChild(dot);
            });
            const moviesContainer = document.getElementById('channelsGrid');
            if(moviesContainer && moviesContainer.firstChild) moviesContainer.insertBefore(carouselDiv, moviesContainer.firstChild);
            else moviesContainer.appendChild(carouselDiv);
            document.getElementById('heroPrev')?.addEventListener('click', () => { goToSlide((currentSlide - 1 + heroSlides.length) % heroSlides.length); });
            document.getElementById('heroNext')?.addEventListener('click', () => { goToSlide((currentSlide + 1) % heroSlides.length); });
            startAutoSlide();
        }

        function goToSlide(index) {
            const slides = document.querySelectorAll('.hero-slide');
            const dots = document.querySelectorAll('.dot');
            if(!slides.length) return;
            slides[currentSlide].classList.remove('active');
            dots[currentSlide]?.classList.remove('active');
            currentSlide = index;
            slides[currentSlide].classList.add('active');
            dots[currentSlide]?.classList.add('active');
        }

        // -------- MOVIE RENDER (with floating trailer on poster hover & click to play) ----------
        let trendAutoScrollInterval = null;
        let trendScrollDivRef = null;
        function startTrendAutoScroll(scrollDiv) {
            trendScrollDivRef = scrollDiv;
            if (trendAutoScrollInterval) clearInterval(trendAutoScrollInterval);
            let direction = 1;
            trendAutoScrollInterval = setInterval(() => {
                if (!trendScrollDivRef || trendScrollDivRef.paused) return;
                const maxScroll = scrollDiv.scrollWidth - scrollDiv.clientWidth;
                if (maxScroll <= 0) return;
                if (scrollDiv.scrollLeft >= maxScroll) direction = -1;
                if (scrollDiv.scrollLeft <= 0) direction = 1;
                scrollDiv.scrollBy({ left: direction * 2, behavior: 'smooth' });
            }, 30);
            scrollDiv.paused = false;
            scrollDiv.addEventListener('mouseenter', () => { scrollDiv.paused = true; });
            scrollDiv.addEventListener('mouseleave', () => { scrollDiv.paused = false; });
            scrollDiv.addEventListener('touchstart', () => { scrollDiv.paused = true; });
            scrollDiv.addEventListener('touchend', () => { scrollDiv.paused = false; });
        }

        let genreObserver = null;
        function setupGenreScrollObserver() {
            if (genreObserver) genreObserver.disconnect();
            const rows = channelsGrid.querySelectorAll('.movie-row-header');
            if (!rows.length) return;
            genreObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const titleEl = entry.target.querySelector('.movie-row-title');
                        if (titleEl) {
                            const genreName = titleEl.textContent.trim();
                            const genres = ["Trend", "All Movies", "Action", "Comedy", "Drama", "Horror", "Adventure", "Animation", "Crime", "Mystery", "Romance", "Fantasy", "Sci-Fi", "Thriller"];
                            const genre = genreName === 'All Movies' ? 'All' : genreName;
                            if (genres.includes(genre) || genre === 'All') {
                                document.querySelectorAll('#genreTabs .filter-tab').forEach(btn => {
                                    if (btn.innerText === genre) {
                                        btn.classList.add('active');
                                    } else {
                                        btn.classList.remove('active');
                                    }
                                });
                                if (currentGenre !== genre) currentGenre = genre;
                            }
                        }
                    }
                });
            }, { threshold: 0.7 });
            rows.forEach(row => genreObserver.observe(row));
        }

        function showSearchLoading() {
            channelsGrid.innerHTML = `<div class="search-loading"><i class="fas fa-spinner fa-pulse"></i><div>Loading search results...</div></div>`;
        }

        function showNoResults(msg = 'No movies found') {
            channelsGrid.innerHTML = `<div class="no-results"><i class="fas fa-film-slash"></i><div>${msg}</div><div style="font-size:12px; margin-top:8px;">Try a different title or IMDb ID</div></div>`;
        }

        function renderMovies() {
            channelsGrid.className = 'movies-container';
            if (window.isSearching) {
                showSearchLoading();
                return;
            }
            
            let allMovies = currentGenre === 'All' ? displayItems : displayItems.filter(m => m.genre === currentGenre);
            if (currentGenre === 'Trend') {
                allMovies = trendingMovies.length ? trendingMovies : movieMaster.slice(0, 5);
            }
            if (showFavMovies) {
                allMovies = allMovies.filter(m => isMovieFav(m));
            }
            if(allMovies.length === 0) {
                if (searchQuery.trim() !== "") {
                    showNoResults('Movie not found');
                } else {
                    channelsGrid.innerHTML = '<div style="padding:40px; text-align:center;">No movies found</div>';
                }
                return;
            }

            channelsGrid.innerHTML = '';
            initHeroCarousel(allMovies);

            function createMovieRow(genreName, movies) {
                if(movies.length === 0) return;
                const row = document.createElement('div');
                row.className = 'movie-row';
                const scrollId = `movieScroll_${genreName.replace(/\s/g, '_')}`;
                row.innerHTML = `<div class="movie-row-header"><div class="movie-row-title">${genreName}</div><div class="scroll-buttons"><div class="scroll-btn prev"><i class="fas fa-chevron-left"></i></div><div class="scroll-btn next"><i class="fas fa-chevron-right"></i></div></div></div><div class="movie-row-scroll" id="${scrollId}"></div>`;
                const scrollDiv = row.querySelector('.movie-row-scroll');
                movies.forEach(m => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    const likeCount = likes.get(m.imdbId) || 0;
                    const isLiked = userLiked.get(m.imdbId) || false;
                    card.innerHTML = `<img class="movie-poster" src="${m.logo}" onerror="this.src='https://via.placeholder.com/300x450'"><div class="rating-badge"><i class="fas fa-star"></i> ${m.rating}<span class="imdb-text">IMDb</span></div><div class="poster-actions"><div class="action-btn play-movie" data-tooltip="Play"><i class="fas fa-play"></i><span class="custom-tooltip">Play</span></div><div class="action-btn copy-imdb" data-tooltip="IMDb"><i class="fab fa-imdb"></i><span class="custom-tooltip">IMDb</span></div><div class="action-btn trailer-btn" data-tooltip="Trailer"><i class="fab fa-youtube"></i><span class="custom-tooltip">Trailer</span></div><div class="action-btn provider-switch" data-tooltip="Server"><i class="fas fa-exchange-alt"></i><span class="custom-tooltip">Server</span></div></div><div class="movie-info"><div class="movie-title">${m.name}</div><div class="movie-year">${m.year}</div></div>`;
                    
                    const favTop = document.createElement('div');
                    favTop.className = `fav-btn-top ${isLiked ? 'active' : ''}`;
                    favTop.title = 'Rate this movie';
                    favTop.innerHTML = `<i class="fas fa-heart"></i> ${likeCount}`;
                    favTop.onclick = (e) => { e.stopPropagation(); toggleLike(m); };
                    card.appendChild(favTop);
                    
                    card.addEventListener('dblclick', (e) => {
                        e.stopPropagation();
                        toggleMovieFav(m);
                        showToast(isMovieFav(m) ? 'Added to favorites' : 'Removed from favorites');
                    });
                    
                    card.querySelector('.play-movie').onclick = (e) => { e.stopPropagation(); currentMovieItem = m; playChannel(displayItems.indexOf(m), false); };
                    card.querySelector('.copy-imdb').onclick = (e) => { e.stopPropagation(); window.open(`https://www.imdb.com/title/${m.imdbId}/`, '_blank'); showToast('Opening IMDb'); };
                    
                    // Trailer button: click to play in main player
                    const trailerBtn = card.querySelector('.trailer-btn');
                    trailerBtn.onclick = (e) => {
                        e.stopPropagation();
                        if (m) {
                            playTrailerInMainPlayer(m);
                        }
                    };
                    
                    card.querySelector('.provider-switch').onclick = (e) => { e.stopPropagation(); showProviderSelector(m, () => playChannel(displayItems.indexOf(m), true)); };
                    
                    // CARD HOVER: show floating trailer on poster hover
                    card.addEventListener('mouseenter', (e) => {
                        // Only if not currently playing in main player
                        if (youtubeIframe.style.display !== 'block' || !youtubeIframe.src) {
                            showFloatingTrailer(m, e, card);
                        }
                    });
                    card.addEventListener('mouseleave', () => {
                        hideFloatingTrailer();
                    });
                    
                    card.onclick = () => { currentMovieItem = m; playChannel(displayItems.indexOf(m), false); };
                    
                    card.querySelectorAll('.action-btn').forEach(btn => {
                        const tooltip = btn.querySelector('.custom-tooltip');
                        btn.addEventListener('mouseenter', () => { if(tooltip) tooltip.style.display = 'block'; });
                        btn.addEventListener('mouseleave', () => { if(tooltip) tooltip.style.display = 'none'; });
                    });
                    scrollDiv.appendChild(card);
                });
                row.querySelector('.prev').onclick = () => scrollDiv.scrollBy({ left: -300, behavior: 'smooth' });
                row.querySelector('.next').onclick = () => scrollDiv.scrollBy({ left: 300, behavior: 'smooth' });
                channelsGrid.appendChild(row);
                if (genreName === 'Trend') startTrendAutoScroll(scrollDiv);
            }

            if(currentGenre === 'Trend') {
                createMovieRow('Trend', trendingMovies.length ? trendingMovies : movieMaster.slice(0, 5));
                const allMoviesForSearch = searchQuery.trim() ? movieMaster.filter(m => m.name.toLowerCase().includes(searchQuery.toLowerCase())) : movieMaster;
                createMovieRow('All Movies', allMoviesForSearch);
                const genres = [...new Set(displayItems.map(m => m.genre))];
                genres.sort();
                genres.forEach(genre => { createMovieRow(genre, displayItems.filter(m => m.genre === genre)); });
            } else if(currentGenre === 'All') {
                createMovieRow('All Movies', allMovies);
                const genres = [...new Set(displayItems.map(m => m.genre))];
                genres.sort();
                genres.forEach(genre => { createMovieRow(genre, displayItems.filter(m => m.genre === genre)); });
            } else {
                createMovieRow(currentGenre, allMovies);
            }
            setupGenreScrollObserver();
        }

        function showProviderSelector(movie, callback) {
            const div = document.createElement('div'); div.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;border-radius:20px;padding:20px;z-index:1001;min-width:280px;border:1px solid #00f2fe;box-shadow:0 10px 30px rgba(0,0,0,0.5);color:#fff';
            div.innerHTML = `<h4>Select Server</h4>${PROVIDERS.map((p,idx)=>`<button data-idx="${idx}" style="width:100%;padding:12px;margin:5px 0;background:#222;border:none;border-radius:12px;color:white;cursor:pointer;">🎬 ${p.name}</button>`).join('')}<button class="close-provider" style="width:100%;padding:10px;margin-top:10px;background:#333;border:none;border-radius:12px;color:#fa4b6e;cursor:pointer;">Cancel</button>`;
            document.body.appendChild(div);
            div.querySelectorAll('[data-idx]').forEach(btn=>{ btn.onclick=()=>{ let idx=parseInt(btn.dataset.idx); currentProvider = idx; showToast(`Switched to ${PROVIDERS[idx].name}`); div.remove(); if(callback) callback(); }; });
            div.querySelector('.close-provider').onclick = () => div.remove();
        }

        document.getElementById('closeTrailerBtn').onclick = () => { trailerModal.classList.remove('active'); trailerIframe.src = ''; };
        trailerModal.onclick = (e) => { if(e.target === trailerModal) { trailerModal.classList.remove('active'); trailerIframe.src = ''; } };

        const CATEGORY_ORDER = ["All", "Sports", "Series", "Cooking", "Movies", "News", "Entertainment"];

        function renderCategoryTabs() {
            if(currentSource === 'movies') return;
            let cats = ["All", ...new Set(allItems.map(c => c.category))];
            if (currentSource === 'global') {
                cats.sort((a,b) => {
                    let idxA = CATEGORY_ORDER.indexOf(a);
                    let idxB = CATEGORY_ORDER.indexOf(b);
                    if (idxA === -1) idxA = 999;
                    if (idxB === -1) idxB = 999;
                    return idxA - idxB;
                });
            } else {
                cats.sort();
            }
            categoryTabs.innerHTML = cats.map(c => `<button class="filter-tab ${c === currentCategory ? 'active' : ''}">${c}</button>`).join('');
            document.querySelectorAll('#categoryTabs .filter-tab').forEach(btn => {
                btn.onclick = () => {
                    addFireEffect(btn);
                    currentCategory = btn.innerText;
                    document.querySelectorAll('#categoryTabs .filter-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    refreshDisplay();
                };
            });
        }
        function renderGenreTabs() {
            const genres = ["Trend", "All", "Action", "Comedy", "Drama", "Horror", "Adventure", "Animation", "Crime", "Mystery", "Romance", "Fantasy", "Sci-Fi", "Thriller"];
            genreTabs.innerHTML = genres.map(g => `<button class="filter-tab ${g === currentGenre ? 'active' : ''}">${g}</button>`).join('');
            document.querySelectorAll('#genreTabs .filter-tab').forEach(btn => {
                btn.onclick = () => {
                    addFireEffect(btn);
                    currentGenre = btn.innerText;
                    document.querySelectorAll('#genreTabs .filter-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (trendAutoScrollInterval) { clearInterval(trendAutoScrollInterval); trendAutoScrollInterval = null; }
                    refreshDisplay();
                };
            });
        }

        // -------- SOURCE TOGGLE LISTENERS --------
        document.querySelectorAll('.source-btn').forEach(btn => btn.addEventListener('click', () => setSource(btn.dataset.source)));
        document.getElementById('currentSourceBadge').addEventListener('click', () => channelPanel.classList.toggle('show'));
        document.getElementById('channelToggle').onclick = () => channelPanel.classList.toggle('show');

        favToggle.addEventListener('click', () => {
            if (currentSource === 'movies' || currentSource === 'youtube') {
                showToast('Favorites only for TV channels');
                return;
            }
            showFavoritesOnly = !showFavoritesOnly;
            refreshDisplay();
        });

        movieFavToggle.addEventListener('click', () => {
            if (currentSource !== 'movies') return;
            showFavMovies = !showFavMovies;
            refreshDisplay();
        });

        function updateClockAndDate() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            const dateSpan = document.querySelector('#dateDisplay span');
            if(dateSpan) dateSpan.innerText = now.toLocaleDateString([], { weekday:'short', month:'short', day:'numeric' });
        }
        setInterval(updateClockAndDate, 1000);
        updateClockAndDate();
        setSource('local');
        updateFullscreenIcon();

        document.addEventListener('keydown', (e) => {
            if(document.activeElement?.tagName === 'INPUT') return;
            if(e.code === 'Space') { e.preventDefault(); togglePlayPause(); }
            if(e.code === 'ArrowUp') {
                e.preventDefault();
                let v = Math.min(1, video.volume + 0.05);
                video.volume = v;
                video.muted = false;
                savedVolume = v;
                savedMuted = false;
                localStorage.setItem('darkranks_volume', v);
                localStorage.setItem('darkranks_muted', 'false');
                updateVolumeUI();
                showToast(`Vol ${Math.round(v*100)}%`);
            }
            if(e.code === 'ArrowDown') {
                e.preventDefault();
                let v = Math.max(0, video.volume - 0.05);
                video.volume = v;
                if(v===0) {
                    video.muted = true;
                    savedMuted = true;
                } else {
                    video.muted = false;
                    savedMuted = false;
                }
                savedVolume = v;
                localStorage.setItem('darkranks_volume', v);
                localStorage.setItem('darkranks_muted', savedMuted.toString());
                updateVolumeUI();
                showToast(`Vol ${Math.round(v*100)}%`);
            }
            if(e.code === 'ArrowLeft') { e.preventDefault(); playPrev(); }
            if(e.code === 'ArrowRight') { e.preventDefault(); playNext(); }
            if(e.code === 'Escape') { channelPanel.classList.remove('show'); }
        });

        let hideButtonTimeout;
        function resetButtonHideTimer() {
            if (hideButtonTimeout) clearTimeout(hideButtonTimeout);
            toggleBtn.classList.remove('hidden');
            hideButtonTimeout = setTimeout(() => {
                toggleBtn.classList.add('hidden');
            }, 10000);
        }
        document.addEventListener('mousemove', resetButtonHideTimer);
        hideButtonTimeout = setTimeout(() => {
            toggleBtn.classList.add('hidden');
        }, 10000);

        let ctrlTimeout;
        let navTimeout;
        const navArrows = document.querySelectorAll('.nav-arrow');
        wrapper.addEventListener('mousemove', () => {
            let ctrl = document.getElementById('videoControls');
            if(ctrl.style.display !== 'none') {
                ctrl.style.opacity = '1';
                clearTimeout(ctrlTimeout);
                ctrlTimeout = setTimeout(() => { if(!video.paused) ctrl.style.opacity = '0'; }, 3000);
            }
            navArrows.forEach(arrow => arrow.style.opacity = '0.8');
            clearTimeout(navTimeout);
            navTimeout = setTimeout(() => {
                navArrows.forEach(arrow => arrow.style.opacity = '0');
            }, 3000);
        });
        wrapper.addEventListener('mouseleave', () => {
            document.getElementById('videoControls').style.opacity = '0';
            navArrows.forEach(arrow => arrow.style.opacity = '0');
        });

        // Hide floating trailer when mouse leaves the grid
        channelsGrid.addEventListener('mouseleave', () => {
            hideFloatingTrailer();
        });

        const logoIcon = document.querySelector('.logo-icon');
        if (logoIcon) {
            setInterval(() => {
                logoIcon.classList.add('flip');
                setTimeout(() => {
                    logoIcon.classList.remove('flip');
                }, 300);
            }, 3000);
        }
    })();
    </script>
</body>
</html>
